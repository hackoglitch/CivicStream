[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Route all /api/* requests to the Express serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# SPA fallback – all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
